<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0D1117"/>
  <!-- Decorative gradient accent -->
  <rect width="1200" height="4" fill="url(#grad)" />
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Dropdown icon representation -->
  <g transform="translate(600, 140)">
    <!-- Dropdown arrow box -->
    <rect x="-110" y="-50" width="220" height="130" rx="16" stroke="#6366F1" stroke-width="3" fill="none"/>
    <rect x="-90" y="-35" width="180" height="6" rx="3" fill="#8B5CF6" opacity="0.6"/>
    <rect x="-90" y="-19" width="140" height="6" rx="3" fill="#6366F1" opacity="0.4"/>
    <rect x="-90" y="-3" width="160" height="6" rx="3" fill="#3B82F6" opacity="0.5"/>
    <!-- Dropdown arrow -->
    <polygon points="0,60 -30,20 30,20" fill="#8B5CF6"/>
  </g>
  <!-- Title -->
  <text x="600" y="230" text-anchor="middle" fill="#F0F6FC" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">Dropdown</text>
  <!-- Subtitle -->
  <text x="600" y="270" text-anchor="middle" fill="#8B949E" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" letter-spacing="0.3">Compose Multiplatform Dropdown Menu</text>
  <!-- Tagline -->
  <text x="600" y="300" text-anchor="middle" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" letter-spacing="0.5">Cascade menus · Rich animations · Builder-style API</text>
</svg>
